services:
  $service-name:
    image: minio/minio:latest
    container_name: $service-name
    restart: unless-stopped
    ports:
      - "$port:9000"
      - "$console-port:9001"
    environment:
      MINIO_ROOT_USER: $minio-user
      MINIO_ROOT_PASSWORD: $minio-password
    volumes:
      - $minio-data-path:/data
    command: server /data --console-address ":9001"
    networks:
      - autohost_net

networks:
  autohost_net:
    external: true
