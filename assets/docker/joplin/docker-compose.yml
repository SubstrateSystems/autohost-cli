services:
  $service-name-db:
    image: postgres:16-alpine
    container_name: $service-name-db
    restart: always
    ports:
      - "$postgres-port:5432"
    environment:
      POSTGRES_DB: $postgres-database
      POSTGRES_USER: $postgres-user
      POSTGRES_PASSWORD: $postgres-password
    volumes:
      - $service-name-db:/var/lib/postgresql/data
    networks:
      - autohost_net

  $service-name:
    image: joplin/server:2
    container_name: $service-name
    restart: always
    ports:
      - "$port:22300"
    environment:
      # --- Básicos de Joplin Server ---
      APP_BASE_URL: http://localhost:$port     # ej: https://joplin.tu-dominio.com
      APP_PORT: "22300"
      DB_CLIENT: pg

      # --- Conexión a Postgres ---
      POSTGRES_DATABASE: $postgres-database
      POSTGRES_USER: $postgres-user
      POSTGRES_PASSWORD: $postgres-password
      POSTGRES_PORT: "5432"
      POSTGRES_HOST: $service-name-db
    depends_on:
      - $service-name-db
    networks:
      - autohost_net

volumes:
  $service-name-db:

networks:
  autohost_net:
    external: true
